<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10X CRM - Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Auth Guard - ჩატვირთვისთანავე ამოწმებს სესიას -->
  <script src="js/guard.js"></script>
</head>

<body>

  <header class="dashboard-header">
    <h1 id="navLogo" style="cursor: pointer;">10X CRM</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html">Clients</a>
      <a href="profile.html" class="active">Profile</a>
    </nav>
    <div>
      <button id="themeBtn">Theme</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="dashboard-container">
    <h2>My Profile</h2>

    <div class="crm-card">
      <h3>Profile Information</h3>
      <div class="profile-info-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
        <!-- ავატარის წრე ინიციალებისთვის (P5.1) -->
        <div id="profileInitials" style="width: 60px; height: 60px; border-radius: 50%; background-color: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;">--</div>
        <div>
          <p style="margin: 0;"><strong>Name:</strong> <span id="profileName"></span></p>
          <p style="margin: 5px 0 0 0;"><strong>Email:</strong> <span id="profileEmail"></span></p>
          <p style="margin: 5px 0 0 0;"><strong>Company:</strong> <span id="profileCompany"></span></p>
          <p id="profileDate" style="margin: 5px 0 0 0; font-size: 13px; opacity: 0.7;"></p>
        </div>
      </div>
    </div>

    <div class="crm-card">
      <h3>Edit Profile</h3>
      <form id="profileForm" novalidate>
        <div class="form-group">
          <input type="text" id="fullName" placeholder="Full Name">
        </div>
        <div class="form-group" style="margin-top: 15px;">
          <input type="text" id="company" placeholder="Company">
        </div>
        <button type="submit" style="margin-top: 15px;">
          Save Changes
        </button>
      </form>
    </div>

    <div class="crm-card">
      <h3>Change Password</h3>
      <form id="passwordForm" novalidate>
        <div class="form-group">
          <input type="password" id="currentPassword" placeholder="Current Password">
        </div>
        <div class="form-group" style="margin-top: 15px;">
          <input type="password" id="newPassword" placeholder="New Password">
        </div>
        <div class="form-group" style="margin-top: 15px;">
          <input type="password" id="confirmPassword" placeholder="Confirm Password">
        </div>
        <button type="submit" style="margin-top: 15px;">
          Change Password
        </button>
      </form>
    </div>

    <div class="crm-card">
      <h3>Reset CRM Data</h3>
      <button id="resetBtn">
        Reset Clients
      </button>
    </div>

  </main>

  <script src="js/storage.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>

</html>

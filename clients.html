<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10X CRM - Clients</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Auth Guard - სესიის შემოწმება გვერდის ჩატვირთვამდე -->
  <script src="js/guard.js"></script>
</head>

<body>

  <header class="dashboard-header">
    <h1 id="navLogo" style="cursor: pointer;">10X CRM</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="clients.html" class="active">Clients</a>
      <a href="profile.html">Profile</a>
    </nav>
    <div>
      <button id="themeBtn">Theme</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="dashboard-container">

    <section class="crm-card">
      <div class="clients-top">
        <h2>Clients</h2>
        <button id="addClientBtn">+ Add Client</button>
      </div>
    </section>

    <section class="crm-card">
      <div class="clients-toolbar">
        <input type="text" id="searchInput" placeholder="Search clients...">

        <div class="status-filters">
          <button class="filter-btn active" data-filter="All">All</button>
          <button class="filter-btn" data-filter="Lead">Lead</button>
          <button class="filter-btn" data-filter="Contacted">Contacted</button>
          <button class="filter-btn" data-filter="Won">Won</button>
          <button class="filter-btn" data-filter="Lost">Lost</button>
        </div>

        <select id="sortSelect">
          <option value="newest">Sort: Newest</option>
          <option value="oldest">Sort: Oldest</option>
          <option value="name">Sort: Name</option>
        </select>
      </div>
    </section>

    <!-- კლიენტების ბარათების სექცია -->
    <section class="crm-card">
      <div id="clientsContainer" class="clients-grid">
        Loading clients...
      </div>
    </section>

  </main>

  <!-- ================= ADD CLIENT MODAL ================= -->
  <div id="addClientModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div class="modal-content crm-card" style="background: var(--card-bg, #1e293b); padding: 25px; border-radius: 8px; width: 100%; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
      <h3>Add New Client</h3>
      <form id="addClientForm" novalidate>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Full Name</label>
          <input type="text" id="modalFullName" placeholder="e.g. John Doe" required style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Email</label>
          <input type="email" id="modalEmail" placeholder="e.g. john@example.com" required style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Phone</label>
          <input type="text" id="modalPhone" placeholder="e.g. +995 555 12 34 56" style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Company</label>
          <input type="text" id="modalCompany" placeholder="e.g. Acme Corp" style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
          <label>Deal Value ($)</label>
          <input type="number" id="modalDeal" placeholder="e.g. 5000" style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" id="closeModalBtn" class="btn-secondary" style="padding: 8px 16px;">Cancel</button>
          <button type="submit" class="btn-primary" style="padding: 8px 16px;">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ================= VIEW / EDIT CLIENT DETAIL MODAL ================= -->
  <div id="detailClientModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1001; justify-content: center; align-items: center;">
    <div class="modal-content crm-card" style="background: var(--card-bg, #1e293b); padding: 25px; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); color: #fff; position: relative; box-sizing: border-box;">
      <button id="closeDetailModalBtn" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer;">&times;</button>
      <div id="detailModalBody">
        
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/clients.js"></script>

</body>
</html>
